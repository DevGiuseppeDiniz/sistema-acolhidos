name: YouTrack Create Branches

on:
  workflow_dispatch:
    inputs:
      ready_state:
        description: "Nome exato do estado no YouTrack"
        required: false
        default: "Ready for Dev"
      youtrack_query:
        description: "Query completa do YouTrack"
        required: false
        default: "project: {sistema-acolhidos} State: {Ready for Dev}"
      dry_run:
        description: "Validar sem criar branches"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  create-branches:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branches from YouTrack issues
        shell: pwsh
        env:
          YOUTRACK_BASE_URL: ${{ secrets.YOUTRACK_BASE_URL }}
          YOUTRACK_TOKEN: ${{ secrets.YOUTRACK_TOKEN }}
          YOUTRACK_PROJECT_SHORT_NAME: SIS
          YOUTRACK_READY_STATE: ${{ github.event.inputs.ready_state }}
          YOUTRACK_QUERY: ${{ github.event.inputs.youtrack_query }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN_FOR_BRANCHES: ${{ github.token }}
          BASE_BRANCH: main
          BRANCH_TYPE: feature
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: ./automation/youtrack-github-branch/create-branches-from-youtrack.ps1

      - name: Upload YouTrack base attachments
        uses: actions/upload-artifact@v4
        with:
          name: youtrack-base-attachments
          path: _youtrack_payload/**
          if-no-files-found: ignore
          retention-days: 30

